<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-labelledby="title desc">
  <title id="title">ALPHA stamped mark</title>
  <desc id="desc">A rough clay-red stamp reading ALPHA BUILD.</desc>
  <defs>
    <filter id="rough" x="-10%" y="-20%" width="120%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6"/>
    </filter>
    <linearGradient id="ink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c95d46"/>
      <stop offset="1" stop-color="#7e3329"/>
    </linearGradient>
  </defs>
  <rect width="720" height="260" fill="none"/>
  <g filter="url(#rough)" transform="rotate(-7 360 130)">
    <rect x="80" y="54" width="560" height="150" rx="18" fill="none" stroke="url(#ink)" stroke-width="18"/>
    <rect x="103" y="77" width="514" height="104" rx="10" fill="none" stroke="#9d3e32" stroke-width="5" opacity="0.72"/>
    <text x="360" y="134" text-anchor="middle" font-family="Impact, Arial Black, Arial, sans-serif" font-size="78" letter-spacing="8" fill="#8d372d">ALPHA</text>
    <text x="360" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="12" fill="#b8503e">BUILD</text>
  </g>
  <g opacity="0.24" fill="#7e3329">
    <circle cx="136" cy="78" r="4"/>
    <circle cx="575" cy="184" r="5"/>
    <circle cx="205" cy="205" r="3"/>
    <circle cx="514" cy="55" r="3"/>
  </g>
</svg>
